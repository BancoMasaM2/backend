version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: billetera-db
    environment:
      POSTGRES_DB: billetera_virtual
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:

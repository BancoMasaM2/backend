<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña — Billetera Virtual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-center">
        <div class="auth-card">
            <div class="logo">
                <h1>◈ Billetera</h1>
                <p>Creá una nueva contraseña</p>
            </div>

            <div id="resetAlert"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label>Nueva Contraseña</label>
                    <input type="password" id="nuevaPassword" placeholder="Mínimo 8 caracteres" minlength="8" required>
                </div>
                <div class="form-group">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="confirmarPassword" placeholder="Repetí la contraseña" minlength="8" required>
                </div>
                <button type="submit" class="btn btn-primary" id="resetBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Restablecer Contraseña</span>
                </button>
            </form>

            <div class="auth-links">
                <a href="index.html">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nueva = document.getElementById('nuevaPassword').value;
            const confirmar = document.getElementById('confirmarPassword').value;
            if (nueva !== confirmar) {
                showAlert('resetAlert', 'error', 'Las contraseñas no coinciden');
                return;
            }
            setLoading('resetBtn', true);
            const { ok, data } = await apiFetch('/api/auth/reset-password', {
                method: 'POST',
                body: {
                    tokenUrl: token,
                    nuevaPassword: nueva,
                    confirmarPassword: confirmar,
                },
            });
            setLoading('resetBtn', false);
            if (ok) {
                showAlert('resetAlert', 'success', 'Contraseña actualizada exitosamente');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showAlert('resetAlert', 'error', data.mensaje || 'Error al restablecer contraseña');
            }
        });
    </script>
</body>
</html>

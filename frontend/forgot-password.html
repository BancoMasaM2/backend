<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña — Billetera Virtual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-center">
        <div class="auth-card">
            <div class="logo">
                <h1>◈ Billetera</h1>
                <p>Recuperá tu contraseña</p>
            </div>

            <div id="forgotAlert"></div>

            <p style="text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:24px;">
                Te enviaremos un link para restablecer tu contraseña
            </p>

            <form id="forgotForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="usuario@ejemplo.com" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary" id="forgotBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Enviar Link</span>
                </button>
            </form>

            <div class="auth-links">
                <a href="index.html">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading('forgotBtn', true);
            const { ok, data } = await apiFetch('/api/auth/olvide-password', {
                method: 'POST',
                body: { email: document.getElementById('email').value },
            });
            setLoading('forgotBtn', false);
            showAlert('forgotAlert', 'success', 'Si el email existe, recibirás un link de recuperación');
            document.getElementById('forgotForm').reset();
        });
    </script>
</body>
</html>

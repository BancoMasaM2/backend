<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Email — Billetera Virtual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-center">
        <div class="auth-card">
            <div class="logo">
                <h1>◈ Billetera</h1>
                <p>Verificá tu correo electrónico</p>
            </div>

            <div id="verifyAlert"></div>

            <p style="text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:8px;">
                Ingresá el código de 6 dígitos que enviamos a
            </p>
            <p style="text-align:center;font-size:15px;font-weight:500;margin-bottom:24px;" id="displayEmail"></p>

            <form id="verifyForm">
                <div class="otp-inputs" id="otpContainer">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                </div>

                <button type="submit" class="btn btn-primary" id="verifyBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Verificar</span>
                </button>
            </form>

            <div class="auth-links">
                <a href="index.html">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || '';
        document.getElementById('displayEmail').textContent = email;

        const inputs = document.querySelectorAll('#otpContainer input');
        inputs.forEach((input, i) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && i < inputs.length - 1) {
                    inputs[i + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && i > 0) {
                    inputs[i - 1].focus();
                }
            });
        });

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const codigo = Array.from(inputs).map(i => i.value).join('');
            if (codigo.length !== 6) {
                showAlert('verifyAlert', 'error', 'Ingresá el código completo de 6 dígitos');
                return;
            }
            setLoading('verifyBtn', true);
            const { ok, data } = await apiFetch('/api/auth/validar-email', {
                method: 'POST',
                body: { email, codigo },
            });
            setLoading('verifyBtn', false);
            if (ok) {
                showAlert('verifyAlert', 'success', '¡Email verificado!');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showAlert('verifyAlert', 'error', data.mensaje || 'Código inválido');
            }
        });
    </script>
</body>
</html>

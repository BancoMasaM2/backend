<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse — Billetera Virtual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-center">
        <div class="auth-card">
            <div class="logo">
                <h1>◈ Billetera</h1>
                <p>Creá tu cuenta gratis</p>
            </div>

            <div id="registerAlert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombreCompleto" placeholder="Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label>DNI</label>
                    <input type="text" id="dni" placeholder="12345678" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" id="fechaNacimiento" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 8 caracteres" minlength="8" required>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Crear Cuenta</span>
                </button>
            </form>

            <div class="auth-links">
                <a href="index.html">Ya tengo una cuenta</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading('registerBtn', true);
            const { ok, data } = await apiFetch('/api/auth/registro', {
                method: 'POST',
                body: {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    nombreCompleto: document.getElementById('nombreCompleto').value,
                    dni: document.getElementById('dni').value,
                    fechaNacimiento: document.getElementById('fechaNacimiento').value,
                },
            });
            setLoading('registerBtn', false);
            if (ok) {
                window.location.href = `verify-email.html?email=${encodeURIComponent(document.getElementById('email').value)}`;
            } else {
                showAlert('registerAlert', 'error', data.mensaje || 'Error al registrarse');
            }
        });
    </script>
</body>
</html>
